<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>

    {% load static %}

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            background: #f4f6f9;
        }

        .navbar-custom {
            background: #343a40;
        }

        .navbar-custom .navbar-brand {
            color: white;
        }

        .card-box {
            max-width: 600px;
            margin: 40px auto;
            padding: 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .nav-links a {
            margin-right: 10px;
        }
    </style>
</head>

<body>

<!-- 🔝 Navbar -->
<nav class="navbar navbar-custom px-4">
    <span class="navbar-brand">User Management</span>

    <a href="/examapp/" class="btn btn-light">
        <i class="bi bi-house"></i> Home
    </a>
</nav>

<!-- 🔗 Navigation Buttons -->
<div class="container mt-4 nav-links text-center">
    <a href="/examapp/givemeragister" class="btn btn-primary">Add User</a>
    <a href="/examapp/showuser" class="btn btn-success">Show User</a>
    <a href="/examapp/updateuser" class="btn btn-warning">Update User</a>
    <a href="/examapp/deleteuser" class="btn btn-danger">Delete User</a>
    <a href="/examapp/showalluser" class="btn btn-dark">All Users</a>
</div>

<!-- 📋 Form Card -->
<div class="card-box">

    <h4 class="text-center mb-4">User Form</h4>

    <form>

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control"
                   placeholder="Enter username" value="{{udata.username}}">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="text" name="password" class="form-control"
                   placeholder="Enter password" value="{{udata.password}}">
        </div>

        <div class="mb-3">
            <label class="form-label">Mobile Number</label>
            <input type="tel" name="mobno" class="form-control"
                   placeholder="Enter mobile number" value="{{udata.mobno}}">
        </div>

        <!-- Buttons -->
        <div class="d-flex flex-wrap gap-2 justify-content-center">

            <button class="btn btn-primary" formaction="/examapp/adduser/">
                Add
            </button>

            <button class="btn btn-success" formaction="/examapp/showuser/">
                Show
            </button>

            <button class="btn btn-warning" formaction="/examapp/updateuser/">
                Update
            </button>

            <button class="btn btn-danger" formaction="/examapp/deleteuser/">
                Delete
            </button>

            <button class="btn btn-dark" formaction="/examapp/showalluser/">
                Show All
            </button>

        </div>

    </form>

    <!-- Message -->
    <div class="text-center mt-3">
        <span class="text-success fw-bold">{{message}}</span>
    </div>

</div>

</body>
</html>
