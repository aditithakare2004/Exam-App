<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Users</title>

    {% load static %}

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            background: #f4f6f9;
        }

        .navbar-custom {
            background: #343a40;
        }

        .navbar-custom .navbar-brand {
            color: white;
        }

        .table-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<!-- 🔝 Navbar -->
<nav class="navbar navbar-custom px-4">
    <span class="navbar-brand">User Management</span>

    <a href="/examapp/" class="btn btn-light">
        <i class="bi bi-house"></i> Home
    </a>
</nav>

<!-- 🔗 Navigation Buttons -->
<div class="container mt-4 text-center">
    <a href="/examapp/givemeragister/" class="btn btn-primary">Add User</a>
    <a href="/examapp/showalluser/" class="btn btn-dark">All Users</a>
  <a href="/examapp/showuser" class="btn btn-success">Show User</a>
    <a href="/examapp/updateuser" class="btn btn-warning">Update User</a>
    <a href="/examapp/deleteuser" class="btn btn-danger">Delete User</a>
</div>

<!-- 📊 Table Section -->
<div class="container mt-4">
    <div class="table-container">

        <h4 class="text-center mb-4">All Users</h4>

        <div class="table-responsive">
            <table class="table table-bordered table-hover text-center align-middle">

                <thead class="table-dark">
                    <tr>
                        <th>Username</th>
                        <th>Password</th>
                        <th>Mobile No</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    {% for ud in udata %}
                    <tr>
                        <td>{{ ud.username }}</td>
                        <td>{{ ud.password }}</td>
                        <td>{{ ud.mobno }}</td>

                        <td>
                            <a href="/examapp/deleteusershowall/?username={{ud.username}}"
                               class="btn btn-danger btn-sm">
                                <i class="bi bi-trash"></i> Delete
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

    </div>
</div>

</body>
</html>
