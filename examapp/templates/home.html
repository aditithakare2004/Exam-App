<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    {% load static %}

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            min-height: 100vh;
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .container {
            margin-top: 80px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Exam System</span>
</nav>

<!-- Main Section -->
<div class="container text-center">

    <h2 class="text-white mb-4">Welcome to Exam Portal</h2>

    <div class="row g-4 justify-content-center">

        <!-- Question -->
        <div class="col-md-3 col-sm-6">
            <div class="card shadow p-4">
                <i class="bi bi-question-circle fs-1 text-primary"></i>
                <h5 class="mt-3">Question Operation</h5>
                <a href="/examapp/givemequestioncurd/" class="btn btn-primary mt-2">Open</a>
            </div>
        </div>

        <!-- Student -->
        <div class="col-md-3 col-sm-6">
            <div class="card shadow p-4">
                <i class="bi bi-people fs-1 text-success"></i>
                <h5 class="mt-3">Student Operation</h5>
                <a href="/examapp/givemeusercurd/" class="btn btn-success mt-2">Open</a>
            </div>
        </div>

        <!-- Login -->
        <div class="col-md-3 col-sm-6">
            <div class="card shadow p-4">
                <i class="bi bi-box-arrow-in-right fs-1 text-warning"></i>
                <h5 class="mt-3">Student Login</h5>
                <a href="/examapp/givemelogin/" class="btn btn-warning mt-2">Login</a>
            </div>
        </div>

        <!-- Result -->
        <div class="col-md-3 col-sm-6">
            <div class="card shadow p-4">
                <i class="bi bi-bar-chart fs-1 text-danger"></i>
                <h5 class="mt-3">View Results</h5>
                <a href="/examapp/showallresults/" class="btn btn-danger mt-2">View</a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
