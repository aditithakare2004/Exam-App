<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Results</title>

    {% load static %}

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            background: #f4f6f9;
        }

        .navbar-custom {
            background: #343a40;
        }

        .navbar-custom .navbar-brand {
            color: white;
        }

        .table-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .table thead {
            background: #343a40;
            color: white;
        }

        .home-btn {
            color: white;
            text-decoration: none;
        }

        .home-btn:hover {
            color: #ffc107;
        }
    </style>
</head>

<body>

<!-- 🔝 Navbar -->
<nav class="navbar navbar-custom px-4">
    <span class="navbar-brand">Exam System</span>
    <a href="/examapp/" class="home-btn">
        <i class="bi bi-house"></i> Home
    </a>
</nav>

<!-- 📊 Main Content -->
<div class="container mt-5">

    <div class="text-center mb-4">
        <h2 class="fw-bold">Student Results</h2>
        <p class="text-muted">View all student performance</p>
    </div>

    <div class="table-container">

        <!-- Responsive Table -->
        <div class="table-responsive">
            <table class="table table-striped table-hover text-center align-middle">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Subject</th>
                        <th>Score</th>
                    </tr>
                </thead>

                <tbody>
                    {% for result in resultdb %}
                    <tr>
                        <td>{{ result.username.username }}</td>
                        <td>{{ result.subject }}</td>
                        <td>
                            <span class="badge bg-success">
                                {{ result.score }}
                            </span>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

    </div>

</div>

</body>
</html>
