<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorecard</title>

    {% load static %}

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            background: #f4f6f9;
        }

        .navbar-custom {
            background: #343a40;
        }

        .navbar-custom .navbar-brand {
            color: white;
        }

        .card-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .table thead {
            background: #343a40;
            color: white;
        }

        .score-box {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- 🔝 Navbar -->
<nav class="navbar navbar-custom px-4">
    <span class="navbar-brand">Exam System</span>

    <a href="/examapp/logoutuser" class="btn btn-danger">
        <i class="bi bi-box-arrow-right"></i> Logout
    </a>
</nav>

<!-- 📊 Main Content -->
<div class="container mt-5">

    <div class="text-center mb-4">
        <h2 class="fw-bold">Scorecard</h2>
        <p class="text-muted">Detailed result of your test</p>
    </div>

    <div class="card-container">

        <!-- Responsive Table -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover text-center align-middle">
                <thead>
                    <tr>
                        <th>Q.No</th>
                        <th>Question</th>
                        <th>Your Answer</th>
                        <th>Correct Answer</th>
                    </tr>
                </thead>

                <tbody>
                    {% for res in response %}
                    <tr>
                        <td>{{ res.0 }}</td>
                        <td>{{ res.1 }}</td>

                        <!-- User Answer -->
                        <td>
                            {% if res.2 == res.3 %}
                                <span class="badge bg-success">{{ res.2 }}</span>
                            {% else %}
                                <span class="badge bg-danger">{{ res.2 }}</span>
                            {% endif %}
                        </td>

                        <!-- Correct Answer -->
                        <td>
                            <span class="badge bg-primary">{{ res.3 }}</span>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

        <!-- Final Score -->
        <div class="score-box">
            🎯 Final Score:
            <span class="badge bg-success">{{ finalscore }}</span>
        </div>

    </div>

</div>

</body>
</html>
